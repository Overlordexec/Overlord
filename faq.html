<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ - Overlord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<body>
<div id="navbar"></div>
<div class="page active" id="page-faq">
<div class="faq-page">

  <div class="faq-header">
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <div class="faq-tag"><i class="fa-solid fa-circle-question"></i> FAQ</div>
    <h1>Frequently Asked <span class="gradient-text">Questions</span></h1>
    <p>Everything you need to know about FluxusZ.</p>
  </div>

  <div class="faq-search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input class="faq-search" type="text" placeholder="Search questions..." oninput="faqSearch(this.value)">
  </div>

  <div class="faq-items" id="faqList"></div>

  <div class="faq-discord-section">
    <div class="discord-glow"></div>
    <div class="discord-content">
      <div class="discord-icon"><i class="fa-brands fa-discord"></i></div>

      <p>Join our Discord community for instant support, updates, and to connect with other FluxusZ users.</p>
      <a href="https://discord.gg/fluxusz" target="_blank" class="discord-btn"><i class="fa-brands fa-discord"></i> Join Discord</a>

  </div>

</div>
